<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Mappings Configuration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #667eea;
            --bg: #f8fafc;
            --bg-white: #FFFFFF;
            --border: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
            --green: #10b981;
            --red: #ef4444;
            --blue: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 100%;
        }

        .header {
            margin-bottom: 20px;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
            color: var(--muted);
            transition: all 0.2s;
        }

        .tab.active {
            border-bottom: 3px solid var(--brand);
            color: var(--brand);
        }

        .tab:hover {
            color: var(--brand);
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid;
        }

        .stat-card.green {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-color: #86efac;
        }

        .stat-card.blue {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border-color: #93c5fd;
        }

        .stat-card.red {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border-color: #fca5a5;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-card.green .stat-label { color: #166534; }
        .stat-card.blue .stat-label { color: #1e40af; }
        .stat-card.red .stat-label { color: #991b1b; }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card.green .stat-value { color: #15803d; }
        .stat-card.blue .stat-value { color: #1e3a8a; }
        .stat-card.red .stat-value { color: #b91c1c; }

        /* Actions */
        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-white);
            color: var(--text);
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--brand);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(0.9);
        }

        .btn-purple {
            background: #8b5cf6;
            color: white;
        }

        .btn-purple:hover {
            filter: brightness(0.9);
        }

        .btn-green {
            background: var(--green);
            color: white;
        }

        .btn-green:hover {
            filter: brightness(0.9);
        }

        /* Mappings Grid */
        .mappings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding: 4px;
        }

        .mapping-card {
            background: var(--bg-white);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .mapping-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .mapping-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .mapping-value {
            font-size: 12px;
            color: var(--muted);
        }

        /* Panel */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* Save button */
        .save-section {
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }

        .btn-save {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            transition: all 0.2s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-reload {
            padding: 14px 20px;
            background: var(--muted);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
        }

        .btn-reload:hover {
            filter: brightness(0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <span>🗺️</span>
                <span>Email Mappings Configuration</span>
            </div>
            <div class="subtitle">
                Configurer les mappings pays → OU et produits → Cloud pour les campagnes email
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div id="countryMappingTab" class="tab active" onclick="switchMappingTab('country')">
                🌍 Countries (<span id="countryTabCount">0</span>)
            </div>
            <div id="productMappingTab" class="tab" onclick="switchMappingTab('product')">
                📦 Products (<span id="productTabCount">0</span>)
            </div>
        </div>

        <!-- Country Mapping Panel -->
        <div id="countryMappingPanel" class="panel active">
            <!-- Statistics -->
            <div class="stats">
                <div class="stat-card green">
                    <div class="stat-label">Total Countries</div>
                    <div class="stat-value" id="countryTotalCount">0</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-label">EMEA Countries</div>
                    <div class="stat-value" id="countryEmeaCount">0</div>
                </div>
                <div class="stat-card red">
                    <div class="stat-label">AMER Countries</div>
                    <div class="stat-value" id="countryAmerCount">0</div>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions">
                <input
                    type="text"
                    id="countrySearchInput"
                    placeholder="🔍 Rechercher un pays..."
                    class="search-input"
                    onkeyup="filterCountryMappings()"
                />
                <button class="btn btn-primary" onclick="alert('Fonctionnalité à venir')">
                    ➕ Ajouter un pays
                </button>
                <button class="btn btn-green" onclick="exportCountryCSV()">
                    📥 Export CSV
                </button>
            </div>

            <!-- Mappings Grid -->
            <div id="countryMappingsGrid" class="mappings-grid">
                <!-- Generated by JS -->
            </div>

            <!-- Save -->
            <div class="save-section">
                <button class="btn-save" onclick="saveCountryMappings()">
                    💾 Sauvegarder tous les mappings pays
                </button>
                <button class="btn-reload" onclick="loadCountryMappings()">
                    🔄 Recharger
                </button>
            </div>
        </div>

        <!-- Product Mapping Panel -->
        <div id="productMappingPanel" class="panel">
            <!-- Statistics -->
            <div class="stats">
                <div class="stat-card green">
                    <div class="stat-label">Total Products</div>
                    <div class="stat-value" id="productTotalCount">0</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-label">Agentforce Products</div>
                    <div class="stat-value" id="productAgentforceCount">0</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-label">Core Clouds</div>
                    <div class="stat-value" id="productCoreCount">0</div>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions">
                <input
                    type="text"
                    id="productSearchInput"
                    placeholder="🔍 Rechercher un produit..."
                    class="search-input"
                    onkeyup="filterProductMappings()"
                />
                <button class="btn btn-primary" onclick="alert('Fonctionnalité à venir')">
                    ➕ Ajouter un produit
                </button>
                <button class="btn btn-green" onclick="exportProductCSV()">
                    📥 Export CSV
                </button>
            </div>

            <!-- Mappings Grid -->
            <div id="productMappingsGrid" class="mappings-grid">
                <!-- Generated by JS -->
            </div>

            <!-- Save -->
            <div class="save-section">
                <button class="btn-save" onclick="saveProductMappings()">
                    💾 Sauvegarder tous les mappings produits
                </button>
                <button class="btn-reload" onclick="loadProductMappings()">
                    🔄 Recharger
                </button>
            </div>
        </div>
    </div>

    <!-- Include the existing mappings JS -->
    <script src="js/admin_mappings.js"></script>

    <script>
        // Tab switching
        function switchMappingTab(tab) {
            const countryTab = document.getElementById('countryMappingTab');
            const productTab = document.getElementById('productMappingTab');
            const countryPanel = document.getElementById('countryMappingPanel');
            const productPanel = document.getElementById('productMappingPanel');

            if (tab === 'country') {
                countryTab.classList.add('active');
                productTab.classList.remove('active');
                countryPanel.classList.add('active');
                productPanel.classList.remove('active');
            } else {
                productTab.classList.add('active');
                countryTab.classList.remove('active');
                productPanel.classList.add('active');
                countryPanel.classList.remove('active');
            }
        }

        // Update tab counts
        function updateCountryStats() {
            const total = Object.keys(countryMappings).length;
            const emea = Object.values(countryMappings).filter(ou =>
                ['UKI', 'FRANCE', 'CENTRAL', 'NORTH', 'SOUTH'].includes(ou)
            ).length;
            const amer = Object.values(countryMappings).filter(ou =>
                ['AMER', 'Canada'].includes(ou)
            ).length;

            document.getElementById('countryTabCount').textContent = total;
            document.getElementById('countryTotalCount').textContent = total;
            document.getElementById('countryEmeaCount').textContent = emea;
            document.getElementById('countryAmerCount').textContent = amer;
        }

        function updateProductStats() {
            const total = Object.keys(productMappings).length;
            const agentforce = Object.values(productMappings).filter(c => c === 'Agentforce').length;
            const core = Object.values(productMappings).filter(c =>
                ['Sales', 'Service', 'Marketing', 'Commerce', 'Data'].includes(c)
            ).length;

            document.getElementById('productTabCount').textContent = total;
            document.getElementById('productTotalCount').textContent = total;
            document.getElementById('productAgentforceCount').textContent = agentforce;
            document.getElementById('productCoreCount').textContent = core;
        }

        function filterCountryMappings() {
            // Existing function from admin_mappings.js will be used
            renderCountryMappings();
        }

        function filterProductMappings() {
            // Existing function from admin_mappings.js will be used
            renderProductMappings();
        }

        function exportCountryCSV() {
            const csv = 'Country,OU\n' + Object.entries(countryMappings)
                .map(([country, ou]) => `"${country}","${ou}"`)
                .join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'country_mappings.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportProductCSV() {
            const csv = 'Product,Cloud\n' + Object.entries(productMappings)
                .map(([product, cloud]) => `"${product}","${cloud}"`)
                .join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'product_mappings.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initial load
        loadCountryMappings();
        loadProductMappings();
    </script>
</body>
</html>
