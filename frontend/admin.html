<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #667eea;
  --bg: #f8fafc;
  --bg-white: #FFFFFF;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --green: #10b981;
  --red: #ef4444;
  --blue: #3b82f6;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.12);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
}

header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 30px;
  border-radius: var(--radius);
  margin-bottom: 30px;
  box-shadow: var(--shadow-md);
}

h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
}

.subtitle {
  opacity: 0.9;
  font-size: 16px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
}

.stat-label {
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
}

.stat-icon {
  font-size: 24px;
  margin-bottom: 10px;
}

.card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.card-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.live-indicator {
  width: 10px;
  height: 10px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.user-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.user-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg);
  border-radius: 6px;
}

.user-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 16px;
}

.user-info {
  flex: 1;
}

.user-name {
  font-weight: 600;
  font-size: 14px;
}

.user-action {
  font-size: 13px;
  color: var(--muted);
}

.event-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 500px;
  overflow-y: auto;
}

.event-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  background: var(--bg);
  border-radius: 6px;
  font-size: 13px;
}

.event-type {
  background: var(--brand);
  color: white;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}

.event-user {
  font-weight: 600;
  color: var(--text);
}

.event-time {
  margin-left: auto;
  color: var(--muted);
  font-size: 12px;
}

.refresh-btn {
  background: var(--brand);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

.refresh-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

.no-data {
  text-align: center;
  padding: 40px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🔐 Admin Dashboard</h1>
    <div class="subtitle">Real-time analytics and user activity</div>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">📊</div>
      <div class="stat-label">Total Events</div>
      <div class="stat-value" id="totalEvents">-</div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-label">Unique Users</div>
      <div class="stat-value" id="uniqueUsers">-</div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">📈</div>
      <div class="stat-label">Events (24h)</div>
      <div class="stat-value" id="recentEvents">-</div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">🟢</div>
      <div class="stat-label">Users Online</div>
      <div class="stat-value" id="usersOnline">-</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="live-indicator"></span>
      Live Users (Last 5 minutes)
    </div>
    <div class="user-list" id="liveUsers">
      <div class="no-data">No active users</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      📝 Recent Events
      <button class="refresh-btn" onclick="loadData()" style="margin-left: auto;">🔄 Refresh</button>
    </div>
    <div class="event-list" id="recentEventsList">
      <div class="no-data">No events yet</div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:8000/api/analytics';

async function loadData() {
  try {
    // Load stats
    const statsRes = await fetch(`${API_BASE}/stats`);
    const stats = await statsRes.json();

    document.getElementById('totalEvents').textContent = stats.total_events.toLocaleString();
    document.getElementById('uniqueUsers').textContent = stats.unique_users;
    document.getElementById('recentEvents').textContent = stats.recent_events_24h.toLocaleString();

    // Load active users
    const usersRes = await fetch(`${API_BASE}/active-users?minutes=5`);
    const usersData = await usersRes.json();

    document.getElementById('usersOnline').textContent = usersData.count;

    const liveUsersDiv = document.getElementById('liveUsers');
    if (usersData.users.length === 0) {
      liveUsersDiv.innerHTML = '<div class="no-data">No active users</div>';
    } else {
      liveUsersDiv.innerHTML = usersData.users.map(user => {
        const initials = user.user_id.substring(0, 2).toUpperCase();
        const lastSeen = new Date(user.last_seen);
        const timeAgo = formatTimeAgo(lastSeen);

        return `
          <div class="user-item">
            <div class="user-avatar">${initials}</div>
            <div class="user-info">
              <div class="user-name">${user.user_id}</div>
              <div class="user-action">${user.last_action} • ${timeAgo}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Load recent events
    const eventsRes = await fetch(`${API_BASE}/events?limit=50`);
    const eventsData = await eventsRes.json();

    const eventsDiv = document.getElementById('recentEventsList');
    if (eventsData.events.length === 0) {
      eventsDiv.innerHTML = '<div class="no-data">No events yet</div>';
    } else {
      eventsDiv.innerHTML = eventsData.events.map(event => {
        const timestamp = new Date(event.timestamp);
        const timeStr = timestamp.toLocaleTimeString();

        return `
          <div class="event-item">
            <div class="event-type">${event.type}</div>
            <div class="event-user">${event.user_id}</div>
            <div class="event-time">${timeStr}</div>
          </div>
        `;
      }).join('');
    }
  } catch (error) {
    console.error('Failed to load admin data:', error);
  }
}

function formatTimeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);

  if (seconds < 60) return `${seconds}s ago`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
  return `${Math.floor(seconds / 3600)}h ago`;
}

// Load data on init
loadData();

// Auto-refresh every 5 seconds
setInterval(loadData, 5000);
</script>

</body>
</html>
